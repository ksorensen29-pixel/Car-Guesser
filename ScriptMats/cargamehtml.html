<img id="img" src="" width="400">

<p id="answer"></p>

<script>
const cars = [
  { image: "1.jpeg", name: "Porsche" },
  { image: "2.jpeg", name: "Toyota Corolla" },
  { image: "3.jpeg", name: "Fiat Punto" },
  { image: "4.jpeg", name: "Ferrari SF90 Stradale" },
  { image: "5.jpeg", name: "BMW M3" },
  { image: "6.jpeg", name: "Audi R8" },
  { image: "7.jpeg", name: "Honda Civic" }
];

let currentCar = null;
let score = 0;

function loadRandomCar() {
  const index = Math.floor(Math.random() * cars.length);
  currentCar = cars[index];

  document.getElementById("img").src = currentCar.image;
  document.getElementById("answer").textContent = "";
}

function RevealCurrent() {
  if (currentCar !== null) {
    document.getElementById("answer").textContent =
      "Car Name: " + currentCar.name;
  }
}

window.onload = loadRandomCar;
</script>
